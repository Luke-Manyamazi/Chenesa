<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>

  <!-- Envelope body -->
  <rect x="5" y="12" width="22" height="14" rx="2" fill="white" opacity="0.95"/>

  <!-- Envelope fold / chevron -->
  <path d="M5 12 L16 20 L27 12" stroke="#6366f1" stroke-width="1.6"
        stroke-linejoin="round" fill="none"/>

  <!-- Lightning bolt (top-right corner — energy / AI) -->
  <path d="M23 4 L20.5 9 H23 L20.5 14" stroke="white" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
</svg>
